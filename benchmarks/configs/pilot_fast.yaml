# Fast pilot (shorter wall-clock)
m_epochs: 3
max_iterations: 2
metrics: [accuracy, f1_macro, loss]
selection_metric: accuracy
selection_mode: max
checkpoint_dir: checkpoints
report_dir: reports
xai_enabled: true
xai_samples: 2
xai_method: opticam
device: auto
seed: 42
save_checkpoints: false
verbose: true
early_stopping_patience: 1
event_log_enabled: false
candidate_pruning_enabled: true
candidate_pruning_relative_threshold: 0.85
candidate_pruning_warmup_epochs: 1
