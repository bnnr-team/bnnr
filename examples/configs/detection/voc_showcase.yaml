# BNNR VOC 2007 comprehensive detection showcase config
task: detection
m_epochs: 5
max_iterations: 6
metrics:
  - map_50
  - map_50_95
  - loss
selection_metric: map_50
selection_mode: max
checkpoint_dir: checkpoints_voc
report_dir: reports_voc_detection
xai_enabled: true
xai_samples: 4
detection_xai_method: activation
detection_xai_grid_size: 4
detection_xai_max_gt_boxes: 3
detection_xai_max_pred_boxes: 3
detection_targets_mode: bbox_aware
device: auto
seed: 42
save_checkpoints: true
verbose: true
early_stopping_patience: 3
report_preview_size: 512
report_xai_size: 512
event_log_enabled: true
event_sample_every_epochs: 1
event_xai_every_epochs: 2
candidate_pruning_enabled: true
candidate_pruning_relative_threshold: 0.8
candidate_pruning_warmup_epochs: 2
detection_class_names:
  - aeroplane
  - bicycle
  - bird
  - boat
  - bottle
  - bus
  - car
  - cat
  - chair
  - cow
  - diningtable
  - dog
  - horse
  - motorbike
  - person
  - pottedplant
  - sheep
  - sofa
  - train
  - tvmonitor
