task: detection
device: auto
m_epochs: 3
max_iterations: 3
selection_metric: map_50
selection_mode: max
metrics:
  - map_50
  - map_50_95
  - loss
xai_enabled: true
event_xai_every_epochs: 1
event_sample_every_epochs: 1
report_dir: reports/detection_underwater
report_preview_size: 512
report_xai_size: 512
save_checkpoints: true
detection_targets_mode: bbox_aware
detection_xai_method: activation
detection_xai_grid_size: 4
detection_xai_max_gt_boxes: 3
detection_xai_max_pred_boxes: 3
event_log_enabled: true
candidate_pruning_enabled: true
candidate_pruning_warmup_epochs: 2
