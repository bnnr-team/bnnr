name: release-please

# Automated releases: release-please maintains a release PR (version + CHANGELOG
# computed from Conventional Commits). Merging that PR creates the GitHub release
# and tag, and this same workflow run then builds and publishes to PyPI via
# Trusted Publishing (OIDC) and pings the website redeploy hook.

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASE_PLEASE_APP_ID: ${{ secrets.RELEASE_PLEASE_APP_ID }}
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      # When the GitHub App secrets are configured, release-please opens the
      # release PR as the app, which lets CI run on it automatically. Without the
      # secrets it falls back to GITHUB_TOKEN (releases still work, but the
      # release PR needs a manual close/reopen to trigger CI).
      - uses: actions/create-github-app-token@v3
        id: app-token
        if: env.RELEASE_PLEASE_APP_ID != ''
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: publish-pypi
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (bundled in wheel)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

  redeploy-website:
    name: redeploy-website
    needs: [release-please, publish-pypi]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    env:
      HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Vercel redeploy so the site picks up the new PyPI version
        if: env.HOOK_URL != ''
        run: curl -fsSL -X POST "$HOOK_URL" || echo "Deploy hook call failed (non-fatal)."
