name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-linux:
    name: quality-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Lint benchmarks with ruff
        run: ruff check benchmarks/

      - name: Type check with mypy
        run: mypy src/bnnr/

      - name: Scan dependencies for known vulnerabilities (pip-audit)
        run: |
          ALLOWLIST_ARGS=()
          while IFS= read -r vuln || [[ -n "${vuln}" ]]; do
            [[ -z "${vuln}" || "${vuln}" =~ ^# ]] && continue
            ALLOWLIST_ARGS+=(--ignore-vuln "${vuln}")
          done < security/pip-audit-allowlist.txt
          # pip-audit queries PyPI once per dependency with no built-in retry, so a
          # single transient PyPI 5xx (ServiceError) fails the whole step. Retry a
          # few times with backoff before treating it as a real failure.
          for attempt in 1 2 3; do
            if pip-audit "${ALLOWLIST_ARGS[@]}"; then
              exit 0
            fi
            echo "pip-audit attempt ${attempt} failed; retrying in $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "pip-audit failed after 3 attempts"
          exit 1

      - name: Security lint (bandit)
        run: bandit -r src/bnnr -c pyproject.toml -lll -f txt

      # Includes ``tests/test_ultralytics_detection_train_integration.py`` (YOLOv8 + YOLO26).
      # YOLO26 tests are marked ``yolo26``; on GITHUB_ACTIONS the fixture fails instead of skipping.
      - name: Test with coverage
        run: pytest --cov=bnnr --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # User-facing notebooks (docs/notebooks.md): JSON + kernelspec + compile check
  # of code cells (no kernel / no training). Fast, catches syntax and catalog drift.
  notebooks-smoke:
    name: notebooks-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate user notebooks
        run: python3 scripts/validate_user_notebooks.py

  # Frontend unit tests (vitest): WebSocket reconnect/refetch-on-notify in
  # useRunState, and taskMetrics aggregation. jsdom only, no browser.
  frontend-tests:
    name: frontend-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard_web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard_web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

  # End-to-end onboarding smoke: the demo/train composition is exercised once
  # so broken pipeline wiring fails CI even when unit tests pass.
  e2e-smoke:
    name: e2e-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      - name: Train smoke (1 epoch, tiny MNIST, no dashboard)
        run: |
          python -m bnnr train --dataset mnist --max-train-samples 64 \
            --max-val-samples 32 -e 1 --without-dashboard --preset light -o e2e_out
          report="$(ls e2e_out/reports/run_*/report.json 2>/dev/null | head -1)"
          if [[ -z "${report}" || ! -f "${report}" ]]; then
            echo "e2e smoke failed: no report.json produced"
            exit 1
          fi
          echo "e2e smoke OK: ${report}"

  # Ruff and mypy run only in quality-linux above; matrix jobs re-run pytest on
  # Python 3.10–3.12. Merge still requires quality-linux + matrix + build-package.
  test-ubuntu-matrix:
    name: test-ubuntu (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      # Full suite including YOLO26 + BNNR (see test_ultralytics_detection_train_integration.py).
      - name: Run pytest
        run: pytest -q

  test-cross-platform:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      # Full suite including YOLO26 + BNNR on Windows/macOS.
      - name: Run pytest
        run: pytest -q

  build-package:
    name: build-package
    runs-on: ubuntu-latest
    needs: [quality-linux, test-ubuntu-matrix, test-cross-platform, notebooks-smoke]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (bundled in wheel)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  # PyPI publishing moved to .github/workflows/release-please.yml: it runs after a
  # release-please release PR is merged (release_created), building and publishing
  # via Trusted Publishing in the same run.
