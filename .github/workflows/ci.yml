name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-linux:
    name: quality-linux
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/bnnr/

      # Includes ``tests/test_ultralytics_detection_train_integration.py`` (YOLOv8 + YOLO26).
      # YOLO26 tests are marked ``yolo26``; on GITHUB_ACTIONS the fixture fails instead of skipping.
      - name: Test with coverage
        run: pytest --cov=bnnr --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # User-facing notebooks (docs/notebooks.md): JSON + kernelspec + compile check
  # of code cells (no kernel / no training). Fast, catches syntax and catalog drift.
  notebooks-smoke:
    name: notebooks-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate user notebooks
        run: python3 scripts/validate_user_notebooks.py

  # Ruff and mypy run only in quality-linux above; matrix jobs re-run pytest on
  # Python 3.10–3.12. Merge still requires quality-linux + matrix + build-package.
  test-ubuntu-matrix:
    name: test-ubuntu (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      # Full suite including YOLO26 + BNNR (see test_ultralytics_detection_train_integration.py).
      - name: Run pytest
        run: pytest -q

  test-cross-platform:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build dashboard frontend (required for editable / hatch)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"

      # Full suite including YOLO26 + BNNR on Windows/macOS.
      - name: Run pytest
        run: pytest -q

  build-package:
    name: build-package
    runs-on: ubuntu-latest
    needs: [quality-linux, test-ubuntu-matrix, test-cross-platform, notebooks-smoke]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build dashboard frontend (bundled in wheel)
        uses: ./.github/actions/build-dashboard-frontend

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  # Publikuje na PyPI przy pushu tagu v* (tag musi odpowiadać wersji w pyproject.toml, np. v0.1.2).
  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: build-package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
