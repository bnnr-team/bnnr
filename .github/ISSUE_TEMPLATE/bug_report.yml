name: Bug report
description: Report something that is broken or incorrect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include steps to reproduce and your environment.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Commands, config, or code snippet
      placeholder: |
        1. pip install bnnr
        2. python -m bnnr train ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, BNNR version, GPU/CUDA if relevant
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12
        - bnnr: 0.2.x
        - torch: 2.x / CPU
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal output (redact secrets)
